services:
  - type: web
    name: text-to-learn-api-dubeyharshit0605
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_DB
        value: "true"
      - key: CLIENT_URL
        value: https://text-to-learn-frontend-dubeyharshit0605.onrender.com
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: text-to-learn-frontend-dubeyharshit0605
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://text-to-learn-api-dubeyharshit0605.onrender.com/api
      - key: VITE_AUTH0_DOMAIN
        sync: false
      - key: VITE_AUTH0_CLIENT_ID
        sync: false
      - key: VITE_AUTH0_AUDIENCE
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
